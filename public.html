<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selecciona tu número</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Selecciona tu número</h1>

<div class="stats">

<div id="contador"></div>

<div class="progress">
<div id="progressBar" class="progress-bar"></div>
</div>

</div>

<div id="grid" class="grid"></div>


<div id="modal" class="modal">

<div class="modal-content">

<h2>Reservar número</h2>

<p id="numeroSeleccionado" class="numero-modal"></p>

<input id="nombre" placeholder="Tu nombre">

<div>
<button class="btn-primary" onclick="reservar()">Reservar</button>
<button class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
</div>

</div>

</div>


<script type="module">

import { db } from "./firebase-config.js";
import { ref,onValue,set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

let datos=[];
let numeroActual=null;

const grid=document.getElementById("grid");

onValue(ref(db,"rifa"),(snapshot)=>{

const data=snapshot.val();
datos=[];

data.forEach((item,index)=>{

datos.push({
firebaseId:index,
...item
});

});

renderizar();
actualizarStats();

});


function actualizarStats(){

const total=datos.length;

const vendidos=datos.filter(n=>n.nombre).length;

const porcentaje=Math.round((vendidos/total)*100);

document.getElementById("contador").innerText=
`${vendidos} / ${total} boletos reservados`;

document.getElementById("progressBar").style.width=
porcentaje+"%";

}


function renderizar(){

grid.innerHTML="";

datos.forEach(n=>{

let estado="libre";

if(n.nombre) estado="ocupado";
if(n.pagado) estado="pagado";

const card=document.createElement("div");

card.className="numero "+estado;

card.innerHTML=`
<div class="numero-id">${n.numero}</div>
<div class="numero-status">${estado.toUpperCase()}</div>
`;

if(!n.nombre){

card.onclick=()=>abrirModal(n);

}

grid.appendChild(card);

});

}


function abrirModal(n){

numeroActual=n;

document.getElementById("modal").style.display="flex";
document.getElementById("numeroSeleccionado").innerText=n.numero;

}


window.cerrarModal=function(){

document.getElementById("modal").style.display="none";

}


window.reservar = async function(){

const nombre = document.getElementById("nombre").value.trim();

if(!nombre){
alert("Escribe tu nombre");
return;
}

if(!numeroActual){
alert("Error al seleccionar número");
return;
}

if(numeroActual.nombre){
alert("Este número ya fue reservado");
return;
}

try{

await set(
ref(db,"rifa/"+numeroActual.firebaseId),
{
numero: numeroActual.numero,
nombre: nombre,
pagado: false
}
);

cerrarModal();

alert("Número reservado. Ahora envía el WhatsApp para confirmar.");

const telefono="5212291325534";

const mensaje =
`🎟️ RESERVA DE BOLETO

Número:
${numeroActual.numero}

Nombre:
${nombre}

Favor de confirmar el pago para validar la participación.`;

const url =
"https://api.whatsapp.com/send?phone="
+telefono+
"&text="+encodeURIComponent(mensaje);

window.open(url,"_blank");

}catch(error){

console.error("Error guardando en Firebase:", error);
alert("Error al guardar la reserva");

}

}

</script>

</body>
</html>
